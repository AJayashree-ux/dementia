<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cooking Layout</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 1500px;
      height: 900px;
      border: 1px solid #ddd;
    }

    /* LEFT SIDE */
    .left {
      display: grid;
      grid-template-rows: 1fr 1fr;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* RIGHT SIDE */
    .right {
      background-color: #a9c3d9;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
    }

    .quote {
      font-size: 20px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .author {
      font-weight: bold;
      margin-bottom: 40px;
    }

    /* BUTTON */
    .cta {
      font-size: 18px;
      text-decoration: none;
      color: black;
      padding: 10px 20px;
      border: 2px solid black;
      border-radius: 5px;
      transition: 0.3s;
    }

    .cta:hover {
      background: black;
      color: white;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img src="https://i.pinimg.com/736x/65/fb/4f/65fb4f789c09d4a4eb69072308f7c9b7.jpg">
    <img src="https://i.pinimg.com/1200x/8b/e2/1c/8be21c82ebd346d25a77bba9175c11c4.jpg">
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="quote">
      “Cooking is like love. It should be entered into with abandon or not at all.”
    </div>
    <div class="author">– Harriet Van Horne</div>

    <!-- LINK TO NEXT PAGE -->
     
    <a href="choose_cooking.html"class="cta">Start Your Journey</a>
    <a href="index.html">⬅Back to Home</a>
  </div>

</div>

</body>
</html>
