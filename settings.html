<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
:root {
    --bg: #eef5fb;
    --card: #ffffff;
    --text: #333;
    --primary: #6FA8DC;
}

/* Dark mode */
.dark {
    --bg: #1e1e1e;
    --card: #2c2c2c;
    --text: #f4f4f4;
}

/* High contrast */
.high-contrast {
    --bg: black;
    --card: white;
    --text: black;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #A3C9F1, #6FA8DC);
    color: var(--text);
    transition: 0.3s;
}

/* Container */
.container {
    max-width: 650px;
    margin: 40px auto;
    background: var(--card);
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
}

/* Settings */
.setting {
    margin: 25px 0;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 18px; /* bigger labels */
}

select, button {
    width: 100%;
    padding: 14px; /* bigger touch area */
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* Toggle */
.switch {
    position: relative;
    width: 55px;
    height: 28px;
    display: inline-block;
}

.switch input { display: none; }

.slider {
    position: absolute;
    cursor: pointer;
    background: #ccc;
    border-radius: 30px;
    top: 0; left: 0; right: 0; bottom: 0;
}

.slider:before {
    content: "";
    position: absolute;
    height: 22px;
    width: 22px;
    background: white;
    border-radius: 50%;
    left: 3px;
    bottom: 3px;
    transition: 0.3s;
}

input:checked + .slider {
    background: var(--primary);
}

input:checked + .slider:before {
    transform: translateX(27px);
}

/* Button */
button {
    background: var(--primary);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 17px;
}

button:hover {
    opacity: 0.9;
}

/* FONT SIZES (IMPROVED) */
.small { font-size: 17px; }
.medium { font-size: 19px; }
.large { font-size: 22px; }

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #6FA8DC;
    color: white;
    padding: 14px 22px;
    border-radius: 10px;
    display: none;
    font-size: 16px;
}
/* Top bar */
.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 50px;
    background-color: #eb2323;
    display: flex;
    align-items: center;
    padding-left: 15px;
    z-index: 1000;
}

/* Home link */
.top-bar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
}

.top-bar a:hover {
    color: #4CAF50;
}

/* Add space so content doesn't hide behind bar */
body {
    margin: 0;
    padding-top: 60px;
    font-family: Arial, sans-serif;
}


</style>
</head>

<body>

<div class="container">
    <h1>Settings</h1>

    <!-- Theme -->
    <div class="setting">
        <label>Theme</label>
        <select id="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="auto">Auto</option>
        </select>
    </div>

    <!-- Font -->
    <div class="setting">
        <label>Text Size</label>
        <select id="fontSize">
            <option value="small">Comfort</option>
            <option value="medium">Large</option>
            <option value="large">Extra Large</option>
        </select>
    </div>

    <!-- Accessibility -->
    <div class="setting">
        <label>High Contrast</label>
        <label class="switch">
            <input type="checkbox" id="contrast">
            <span class="slider"></span>
        </label>
    </div>

    <!-- Reduce Motion -->
    <div class="setting">
        <label>Reduce Motion</label>
        <label class="switch">
            <input type="checkbox" id="motion">
            <span class="slider"></span>
        </label>
    </div>

    <button onclick="saveSettings()">Save Settings</button>
    <center>
           <a href="home.html" class="cta">⬅Back to Home</a>
     </center>

</div>

<div class="toast" id="toast">Settings Saved ✅</div>


<script>
// Load
window.onload = () => {
    const theme = localStorage.getItem("theme") || "auto";
    const font = localStorage.getItem("font") || "medium";
    const contrast = localStorage.getItem("contrast") === "true";
    const motion = localStorage.getItem("motion") === "true";

    document.getElementById("theme").value = theme;
    document.getElementById("fontSize").value = font;
    document.getElementById("contrast").checked = contrast;
    document.getElementById("motion").checked = motion;

    applyTheme(theme);
    applyFont(font);
    applyContrast(contrast);
};

// Theme
function applyTheme(theme) {
    if (theme === "dark") {
        document.body.classList.add("dark");
    } else if (theme === "light") {
        document.body.classList.remove("dark");
    } else {
        const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.classList.toggle("dark", dark);
    }
}

// Font
function applyFont(size) {
    document.body.classList.remove("small","medium","large");
    document.body.classList.add(size);
}

// Contrast
function applyContrast(on) {
    document.body.classList.toggle("high-contrast", on);
}

// Save
function saveSettings() {
    const theme = document.getElementById("theme").value;
    const font = document.getElementById("fontSize").value;
    const contrast = document.getElementById("contrast").checked;
    const motion = document.getElementById("motion").checked;

    localStorage.setItem("theme", theme);
    localStorage.setItem("font", font);
    localStorage.setItem("contrast", contrast);
    localStorage.setItem("motion", motion);

    applyTheme(theme);
    applyFont(font);
    applyContrast(contrast);

    showToast();
}

// Toast
function showToast() {
    const toast = document.getElementById("toast");
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 2000);
}

// Live update
document.getElementById("theme").addEventListener("change", e => applyTheme(e.target.value));
document.getElementById("fontSize").addEventListener("change", e => applyFont(e.target.value));
document.getElementById("contrast").addEventListener("change", e => applyContrast(e.target.checked));

</script>


</body>
</html>
