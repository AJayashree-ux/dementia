<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dementia Screening Test</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #E0FFFF;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
    color: #1f4e79;
}

.question {
    margin: 15px 0;
}

button {
    width: 100%;
    padding: 12px;
    background: #6CA0DC;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #5B8AC4;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Dementia Screening Test</h2>

<form id="testForm">

<div class="question">
<p>1. Do you have trouble making everyday decisions?</p>
<label><input type="radio" name="q1" value="0"> Never</label>
<label><input type="radio" name="q1" value="1"> Sometimes</label>
<label><input type="radio" name="q1" value="2"> Always</label>
</div>

<div class="question">
<p>2. Do you have trouble focusing or concentrating?</p>
<label><input type="radio" name="q2" value="0"> Never</label>
<label><input type="radio" name="q2" value="1"> Sometimes</label>
<label><input type="radio" name="q2" value="2"> Always</label>
</div>

<div class="question">
<p>3. Do you forget names of familiar objects?</p>
<label><input type="radio" name="q3" value="0"> Never</label>
<label><input type="radio" name="q3" value="1"> Sometimes</label>
<label><input type="radio" name="q3" value="2"> Always</label>
</div>

<div class="question">
<p>4. Do you get confused in familiar places?</p>
<label><input type="radio" name="q4" value="0"> Never</label>
<label><input type="radio" name="q4" value="1"> Sometimes</label>
<label><input type="radio" name="q4" value="2"> Always</label>
</div>

<div class="question">
<p>5. Do you forget dates or repeat conversations?</p>
<label><input type="radio" name="q5" value="0"> Never</label>
<label><input type="radio" name="q5" value="1"> Sometimes</label>
<label><input type="radio" name="q5" value="2"> Always</label>
</div>

<button type="button" onclick="calculateResult()">Submit</button>
<center>
    <a href="index.html" class="cta">Go to Home</a>
</center>
  
</form>

<div class="result" id="result"></div>

</div>

<script>
function calculateResult() {
    let total = 0;

    for (let i = 1; i <= 5; i++) {
        let answer = document.querySelector('input[name="q' + i + '"]:checked');
        if (!answer) {
            alert("Please answer all questions");
            return;
        }
        total += parseInt(answer.value);
    }

    let resultText = "";

    if (total <= 2) {
        resultText = "Low Risk (Normal)";
    } 
    else if (total <= 5) {
        resultText = "Mild Concern";
    } 
    else if (total <= 8) {
        resultText = "Moderate Risk - Consider consulting a doctor";
    } 
    else {
        resultText = "High Risk - Seek medical advice immediately";
    }

    document.getElementById("result").innerText = "Your Score: " + total + " → " + resultText;
}

 

    // Show message


</script>


</body>
</html>
