<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Brain Games</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
}

h1 {
    margin: 30px 0;
    color: white;
    font-size: 3em;
}

/* Grid container: exactly 2 per row, centered */
.games-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 games per row */
    gap: 20px; /* space between games */
    padding: 10px;
    max-width: 700px;
    margin: auto;
    justify-items: center; /* center items in each column */
}

/* Make <a> behave like block inside grid */
.games-container a {
    display: block;
    width: 100%; /* fill the column */
}

/* Game card styling */
.game-card {
    width: 100%;
    max-width: 300px; /* optional */
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    overflow: hidden;
    transition: transform 0.3s;
    cursor: pointer;
}

.game-card:hover {
    transform: scale(1.05);
}

.game-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.game-card p {
    margin: 10px 0;
    font-weight: bold;
    color: #333;
}

a {
    text-decoration: none;
    color: inherit;
}

.video-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}
</style>
</head>

<body>

<!-- Background Video -->
<video class="video-bg" autoplay muted loop>
    <source src="videos/bgm.mp4" type="video/mp4">

</video>

<h1 style="color:white">Fun Brain Games</h1>

<div class="games-container">

    <!-- Memory Game -->
     <a href="https://www.helpfulgames.com/subjects/brain-training/memory.html">
        <div class="game-card"> 
            <img src="https://slidechef.net/wp-content/uploads/2024/08/memory-game-template.jpg" alt="Memory Game">
            <p>Memory Card</p>
         
     </div>
   </a>
    

    <!-- Word Puzzle -->
    <a href="https://wordwall.net/en-us/community/word-puzzle" target="_blank">
        <div class="game-card">
            <img src="https://tse3.mm.bing.net/th/id/OIP.b7r74a1U_dzJNwWO-Nn73gHaFz?rs=1&pid=ImgDetMain&o=7&rm=3"  alt="Word Puzzle">
            <p>Word Puzzle</p>
      
      </div>
    </a>
    

    <!-- Quiz Game -->
    <a href="https://www.sporcle.com/games/category/quizzes/" target="_blank">
        <div class="game-card">
            <img src="https://media.istockphoto.com/id/1834462551/vector/quiz-time-neon-lettering-on-brick-wall-background.jpg?s=612x612&w=0&k=20&c=-0ccadTx_Lfi4BLkybmqU89V1KUuJT-1l8N4gLk8WX0=" alt="Quiz Game">
            <p>Word Quiz</p>
       </div>
      </a>
    

    <!-- Word Building -->
    <a href="https://plays.org/word-games/" target="_blank">
        <div class="game-card">
            <img src="https://ecdn.teacherspayteachers.com/thumbitem/Word-Builders-Game-BVC-Game-2-4427768-1656584159/original-4427768-2.jpg" alt="Word Building">
            <p>Word Building</p>
             
        </div>
   </a> 
  <!-- Sequence Game -->
    <a href="https://plays.org/word-games/" target="_blank">
        <div class="game-card">
            <img src="https://play-lh.googleusercontent.com/NIMLUokPDCGlTuVz8dij93jybAjHk9-wXKuAzAr0ClbRqYLgrJulDc6pdh4dLwbCHso" alt="Sequence Game">
            <p>Remember the Sequence</p>
                   </div>
       </a>

           <a href="https://icherya.github.io/Fifteen-Puzzle/" target="_blank">
        <div class="game-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSpdAeyye7poE5Io04kC8Pyo58JNaO0uKal-Q&s" alt="Slide Puzzle">
            <p>Slide Puzzle</p>
                   </div>
       </a>

 <div id="games">
        

        <!-- Memory Cards -->
        <button class="game-btn" onclick="playInside('memory.html')"></button>
 
        <!-- Puzzle -->
        <button class="game-btn" onclick="playInside('puzzle.html')"></button>

        <!-- Word Quiz -->
        <button class="game-btn" onclick="playInside('wordquiz.html')"></button>

        <!-- Word Building -->
        <button class="game-btn" onclick="playInside('wordbuilding.html')"></button>

        <button class="game-btn" onclick="playInside('slidepuzzle.html')"></button>


         </div>


</body>

</html>
